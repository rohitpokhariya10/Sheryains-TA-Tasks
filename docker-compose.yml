name: chotuapp

services:
  mongo:
    image: mongo:7
    container_name: chotuapp-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  api:
    build: ./api
    container_name: chotuapp-api
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "8000:8000"
    env_file:
      - ./api/.env
    environment:
      NODE_ENV: production
      PORT: 8000
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
      MONGO_URI: mongodb://mongo:27017/chotuapp

volumes:
  mongo-data:
